name: dataroom

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      S3_ENDPOINT_INTERNAL: http://minio:9000
      S3_ENDPOINT_PUBLIC: ${S3_ENDPOINT_PUBLIC}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-dataroom-files}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dataroom-api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.dataroom-api.entrypoints=websecure"
      - "traefik.http.routers.dataroom-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.dataroom-api.loadbalancer.server.port=3001"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dataroom-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: pgsty/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGINS}
    volumes:
      - dataroom-miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dataroom-minio.rule=Host(`${MINIO_HOST}`)"
      - "traefik.http.routers.dataroom-minio.entrypoints=websecure"
      - "traefik.http.routers.dataroom-minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.dataroom-minio.loadbalancer.server.port=9000"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${S3_BUCKET:-dataroom-files} || true;
      mc anonymous set none local/${S3_BUCKET:-dataroom-files};
      echo 'MinIO bucket ready';
      "

volumes:
  dataroom-pgdata:
    name: dataroom-pgdata
  dataroom-miniodata:
    name: dataroom-miniodata
