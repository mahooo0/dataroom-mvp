name: dataroom

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      S3_ENDPOINT_INTERNAL: http://minio:9000
      S3_ENDPOINT_PUBLIC: ${S3_ENDPOINT_PUBLIC}
      S3_REGION: us-east-1
      # Scoped service account provisioned by minio-init; NOT the root key.
      # RCE in the API therefore does not grant bucket-admin / console access.
      S3_ACCESS_KEY: ${DATAROOM_APP_KEY:?DATAROOM_APP_KEY must be set}
      S3_SECRET_KEY: ${DATAROOM_APP_SECRET:?DATAROOM_APP_SECRET must be set}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET must be set}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS must be set — never use "*" in prod}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:?PUBLIC_WEB_URL must be set}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dataroom-api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.dataroom-api.entrypoints=websecure"
      - "traefik.http.routers.dataroom-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.dataroom-api.loadbalancer.server.port=3001"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dataroom-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # Pin a specific tag — pgsty/minio :latest can and does change. Bump this
    # deliberately, don't drift into it.
    image: pgsty/minio:2025.09.07
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGINS:?MINIO_CORS_ORIGINS must be set — never "*" in prod}
    volumes:
      - dataroom-miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dataroom-minio.rule=Host(`${MINIO_HOST}`)"
      - "traefik.http.routers.dataroom-minio.entrypoints=websecure"
      - "traefik.http.routers.dataroom-minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.dataroom-minio.loadbalancer.server.port=9000"

  minio-init:
    image: minio/mc:RELEASE.2025-09-07T16-13-09Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      DATAROOM_APP_KEY: ${DATAROOM_APP_KEY:?DATAROOM_APP_KEY must be set}
      DATAROOM_APP_SECRET: ${DATAROOM_APP_SECRET:?DATAROOM_APP_SECRET must be set}
      S3_BUCKET: ${S3_BUCKET:-dataroom-files}
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/$${S3_BUCKET} || true;
      mc anonymous set none local/$${S3_BUCKET};
      cat > /tmp/dataroom-app.json <<EOF
      {
        \"Version\": \"2012-10-17\",
        \"Statement\": [
          {
            \"Effect\": \"Allow\",
            \"Action\": [
              \"s3:GetObject\",
              \"s3:PutObject\",
              \"s3:DeleteObject\",
              \"s3:GetBucketLocation\",
              \"s3:ListBucket\",
              \"s3:HeadBucket\"
            ],
            \"Resource\": [
              \"arn:aws:s3:::$${S3_BUCKET}\",
              \"arn:aws:s3:::$${S3_BUCKET}/*\"
            ]
          }
        ]
      }
      EOF
      ;
      mc admin policy create local dataroom-app /tmp/dataroom-app.json || mc admin policy update local dataroom-app /tmp/dataroom-app.json;
      mc admin user svcacct add local ${MINIO_ROOT_USER} \
        --access-key $${DATAROOM_APP_KEY} \
        --secret-key $${DATAROOM_APP_SECRET} \
        --policy /tmp/dataroom-app.json \
      || mc admin user svcacct edit local $${DATAROOM_APP_KEY} \
        --secret-key $${DATAROOM_APP_SECRET} \
        --policy /tmp/dataroom-app.json;
      echo 'MinIO bucket ready with scoped service account';
      "

volumes:
  dataroom-pgdata:
    name: dataroom-pgdata
  dataroom-miniodata:
    name: dataroom-miniodata
