name: dataroom-api

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      S3_ENDPOINT_INTERNAL: ${S3_ENDPOINT_INTERNAL:-http://minio:9000}
      S3_ENDPOINT_PUBLIC: ${S3_ENDPOINT_PUBLIC}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-dataroom-files}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      USER_QUOTA_BYTES: ${USER_QUOTA_BYTES:-1073741824}
    networks:
      - infra
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dataroom-api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.dataroom-api.entrypoints=websecure"
      - "traefik.http.routers.dataroom-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.dataroom-api.loadbalancer.server.port=3001"
      - "traefik.docker.network=dokploy-network"

networks:
  infra:
    external: true
    name: dataroom-infra-hokit0_default
  dokploy-network:
    external: true
