name: dataroom-infra

# Development-time infrastructure deployed on Dokploy.
# Postgres is bound to loopback only — reach it from local dev via
# `ssh -N -L 5432:localhost:5432 holy-water`.
# MinIO is exposed publicly via Traefik so the browser can PUT presigned
# uploads directly (bytes never cross Fastify).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dataroom}
      POSTGRES_USER: ${POSTGRES_USER:-dataroom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # 5432 is taken on this VPS by an existing service; use 15432 on host.
      # Reach it locally via: ssh -N -L 5432:localhost:15432 holy-water
      - "127.0.0.1:15432:5432"
    volumes:
      - dataroom-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataroom} -d ${POSTGRES_DB:-dataroom}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGINS}
      MINIO_BROWSER_REDIRECT_URL: https://${MINIO_CONSOLE_HOST}
    volumes:
      - dataroom-miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${S3_BUCKET:-dataroom-files} || true;
      mc anonymous set none local/${S3_BUCKET:-dataroom-files};
      echo 'MinIO bucket ready';
      "
    restart: "no"

volumes:
  dataroom-pgdata:
    name: dataroom-pgdata
  dataroom-miniodata:
    name: dataroom-miniodata
